    function normalizePayload(p) {
      if (!p) return {};
      if (typeof p === "string") {
        try { return JSON.parse(p); } catch { return {}; }
      }

    function fmtDateTime(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      return d.toLocaleString("zh-TW", { hour12: false });
    }
    
    function fmtYMDHM(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "-";
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

    function badgeClass(status) {
      if (status === "confirmed") return "badge b-confirmed";
      if (status === "completed") return "badge b-completed";
      if (status === "cancelled") return "badge b-cancelled";
      return "badge b-pending";
    }

      if (status === "confirmed") return "已確認";
      if (status === "completed") return "已完成";

    function petTypeText(v) {
  const s = (v ?? '').toString();
  if (s === 'cat' || s === '貓咪') return '貓咪';
  if (s === 'dog' || s === '狗狗') return '狗狗';
  return s || '-';
}

function paymentMethodText(method, other) {
  const m = (method ?? '').toString();
  if (m === '其他' || m === 'other') return (other || '其他');
  if (m === 'LINE Pay' || m === 'linepay' || m === 'LinePay') return 'LINE Pay';
  if (m === '現金' || m === 'cash') return '現金';
  return m || '-';
}

function isAggressive(payload) {
  const v = (payload?.aggressive ?? '').toString().trim();
  // 你的表單是 '是'/'否'，但也兼容舊資料可能是 '有攻擊性'
  return v === '是' || v === '有攻擊性' || v.toLowerCase() === 'yes' || v === 'true';
}

function hasMedicalHistory(payload) {
  // 你現在表單是 medical_history_has: '有'/'無'
  const v = (payload?.medical_history_has ?? payload?.history_check ?? '').toString().trim();
  return v === '有' || v === '有病史' || v.toLowerCase() === 'yes' || v === 'true';
}

function hasAnyNote(record, payload) {
  const adminNote = (record?.admin_note ?? '').toString().trim();
  const customerNote = (payload?.note ?? '').toString().trim();
  const otherSvc = (payload?.other_service_text ?? payload?.otherServiceText ?? '').toString().trim();
  return !!(adminNote || customerNote || otherSvc);
}

  // ✅ 沒刪到任何資料：最常見就是 RLS 擋掉 / 權限不足 / 條件沒命中
  if (!data || data.length === 0) {
    return toast("刪除失敗：沒有刪到任何資料（可能是權限不足/RLS 擋住）");
  }

  // local update
  records = records.filter(x => x.id !== id);
  selectedRecord = null;
  closeModal("detailModal");
  renderRecords();
  renderCustomers();
  toast("✅ 已刪除");
}

    // =========================
    // Sensitive action re-auth
    // =========================
    function openAuthModal(actionFn) {
      pendingSensitiveAction = actionFn;
      $("authPassword").value = "";
      $("authError").classList.add("hidden");
      openModal("authModal");
      $("authPassword").focus();
    }

    async function confirmAuth() {
      const pwd = $("authPassword").value;
      if (!pwd) return;

      $("btnAuthConfirm").disabled = true;
      $("btnAuthConfirm").classList.add("opacity-60");

      try {
        const { data } = await sb.auth.getUser();
        const email = data?.user?.email;
        const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
        if (error) throw error;

        closeModal("authModal");
        if (typeof pendingSensitiveAction === "function") pendingSensitiveAction();
        pendingSensitiveAction = null;
      } catch (e) {
        $("authError").textContent = "驗證失敗：密碼錯誤";
        $("authError").classList.remove("hidden");
      } finally {
        $("btnAuthConfirm").disabled = false;
        $("btnAuthConfirm").classList.remove("opacity-60");
      }
    }

    // =========================
    // Tabs
    // =========================
function setTab(tab) {
  const base = "btn-jelly py-3 rounded-2xl font-black text-sm flex items-center justify-center gap-2";
  const active = " bg-sd-mint text-white";
  const inactive = " bg-white text-sd-mint border border-sd-mint/15";

  if (tab === "customers") {
    $("tabCustomers").className = base + active;
    $("tabRecords").className = base + inactive;

    $("customersPanel").classList.remove("hidden");
    $("recordsPanel").classList.add("hidden");
    renderCustomers();
  } else {
    $("tabRecords").className = base + active;
    $("tabCustomers").className = base + inactive;

    $("recordsPanel").classList.remove("hidden");
    $("customersPanel").classList.add("hidden");
    renderRecords();
  }

  lucide.createIcons();
}
    // =========================
    // Boot
    // =========================
    async function bootApp() {
      $("viewLoading").classList.add("hidden");

      const session = await ensureSession();
      if (!session) {
        $("viewLogin").classList.remove("hidden");
        $("viewApp").classList.add("hidden");
        $("topBar").classList.add("hidden");
        $("btnSignOut").classList.add("hidden");
        lucide.createIcons();
        return;
      }

      const user = await loadUserAndGuard();
      if (!user) {
        $("viewLogin").classList.remove("hidden");
        $("viewApp").classList.add("hidden");
        $("btnSignOut").classList.add("hidden");
        lucide.createIcons();
        return;
      }

      $("viewLogin").classList.add("hidden");
      $("viewApp").classList.remove("hidden");
      $("topBar").classList.remove("hidden");

      // fetch data
      await fetchRecords();
      setTab("records");
      renderCustomers();
      lucide.createIcons();
    }

    // ✅ Service Worker：自動更新 + 更新後自動刷新（後台也註冊同一支）
(function registerAutoUpdateSW() {
  if (!('serviceWorker' in navigator)) return;

  let refreshing = false;

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });

  window.addEventListener('load', async () => {
    try {
      // 建議用 /sw.js 確保 scope 在根目錄（index/admin 共用）
      const reg = await navigator.serviceWorker.register('/sw.js?v=3');

      if (reg.waiting) {
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      }

      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;

        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });

      setInterval(() => reg.update(), 10 * 60 * 1000);

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') reg.update();
      });
    } catch (err) {
      console.warn('Service Worker 註冊失敗：', err);
    }
  });
})();
